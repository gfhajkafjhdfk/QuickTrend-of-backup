name: Deploy to Server

on:
  push:
    branches:
      - main # mainブランチにpushされたら自動デプロイ
  workflow_dispatch: # Actionsタブから手動実行も可能にする

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }} # 環境変数経由で受け取る（スクリプトへの直接埋め込みより安全・堅牢）
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::error::DEPLOY_KEY secretが未登録です。リポジトリのSettings > Secrets and variables > Actions で登録してください"
            exit 1
          fi
          mkdir -p ~/.ssh
          # 安全な診断情報（鍵の中身そのものは絶対に出力しない）
          echo "Secret文字数: ${#DEPLOY_KEY}"
          case "$DEPLOY_KEY" in
            -----BEGIN*) echo "形式: PEM（そのまま使用）"
              printf '%s' "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
              echo >> ~/.ssh/deploy_key ;;
            ssh-ed25519*|ssh-rsa*) echo "::error::公開鍵(.pub)が貼られています。秘密鍵またはそのBase64を登録してください"; exit 1 ;;
            *) echo "形式: Base64として復号を試行"
              if ! printf '%s' "$DEPLOY_KEY" | tr -d ' \r\n' | base64 -d > ~/.ssh/deploy_key 2>/dev/null; then
                echo "::error::DEPLOY_KEYがPEMでもBase64でもありません"; exit 1
              fi ;;
          esac
          chmod 600 ~/.ssh/deploy_key
          # 鍵の形式チェック（壊れた鍵ならここで分かるメッセージを出して止める）
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::DEPLOY_KEYの内容が秘密鍵として不正です（コピー漏れ・余分な文字の混入の可能性）"
            exit 1
          fi
          echo "鍵の検証: OK"
          # known_hosts取得（一時的なネットワーク不調に備えて3回までリトライ）
          for i in 1 2 3; do
            ssh-keyscan -T 15 -H 160.251.143.121 >> ~/.ssh/known_hosts && break
            echo "ssh-keyscanリトライ ($i/3)"; sleep 5
          done
          grep -q 160.251.143.121 ~/.ssh/known_hosts || { echo "::error::サーバーに到達できません(ssh-keyscan失敗)"; exit 1; }

      # 本番に必要なファイルだけを転送する。
      # 開発用ファイル（DBスキーマ・設計メモ・未ビルドNext.js等）はWebルートに置かない。
      # --delete: リポジトリから消えたファイルはサーバーからも消す
      #（excludeしたものは削除対象にならないため config.local.php は保持される）
      - name: Deploy (rsync)
        run: |
          rsync -az --delete \
            --exclude '.git*' \
            --exclude 'note/' \
            --exclude 'system.blueprint/' \
            --exclude 'ai-matching-app/' \
            --exclude 'README.md' \
            --exclude 'test.txt' \
            --exclude 'database.sql' \
            --exclude 'database.seed.dev.sql' \
            --exclude '.htaccess' \
            --exclude 'ChatReal.html' \
            --exclude 'php/config.local.php' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ root@160.251.143.121:/var/www/quicktrend/

      # 所有権・権限を本番ポリシー（root管理・www-dataは読み取りのみ）に揃え、
      # PHP構文チェックで壊れたデプロイを検知する
      - name: Fix permissions & verify
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes root@160.251.143.121 '
            set -e
            chown -R root:www-data /var/www/quicktrend
            find /var/www/quicktrend -type d -exec chmod 750 {} +
            find /var/www/quicktrend -type f -exec chmod 640 {} +
            find /var/www/quicktrend -name "*.php" -print0 | xargs -0 -n1 php -l > /dev/null
            curl -s -o /dev/null -w "トップページ: HTTP %{http_code}\n" http://localhost/
            echo "✅ デプロイ完了！"
          '
