<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTrend - 登録</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body class="auth-page">
    <main class="box">
        <h1>新規登録</h1>
        <p id="authMessage" class="error" hidden></p>
        <form method="post" action="php/register.php">
            <label for="name">ニックネーム
                <input type="text" id="name" name="name" required autocomplete="nickname">
            </label>
            <label for="email">メールアドレス
                <input type="email" id="email" name="email" required autocomplete="email">
            </label>
            <label for="password">パスワード
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </label>
            <label for="genre">得意ジャンル
                <select id="genre" name="genre" required>
                    <option value="music">音楽</option>
                    <option value="travel">旅行</option>
                    <option value="food">グルメ</option>
                    <option value="movie">映画</option>
                    <option value="sports">スポーツ</option>
                </select>
            </label>
            <button type="submit">登録する</button>
        </form>
        <a href="sighin.html">すでにアカウントをお持ちの方はこちら</a>
    </main>
    <script>
    (function () {
        // クエリ文字列のコードを固定文言に変換して表示する（文字列をそのまま出さないためXSSの心配なし）
        var messages = {
            signup_failed: '入力内容に不備があります。もう一度入力してください。',
            email_taken: 'このメールアドレスは既に登録されています。',
            invalid_request: '不正なリクエストです。もう一度入力してください。'
        };
        var msg = new URLSearchParams(location.search).get('msg');
        if (msg && messages[msg]) {
            var el = document.getElementById('authMessage');
            el.textContent = messages[msg];
            el.hidden = false;
        }
        // CSRFトークンを取得してフォームに埋め込む
        fetch('php/csrf_token.php')
            .then(function (res) { return res.json(); })
            .then(function (data) {
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'csrf_token';
                input.value = data.token;
                document.querySelector('form').appendChild(input);
            });
    })();
    </script>
</body>
</html>
