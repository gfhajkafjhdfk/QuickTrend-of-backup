    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script
      src="https://kit.fontawesome.com/12802bf766.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <!-- 上部コントロールバー -->

      </div>

      </div>

    <!-- ジャンル一覧 -->

          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="つながリンク">
            <i class="fa-solid fa-comments"></i>
             <div class="genre-text-wrap">
            <span>つながリンク</span>
             <p class="genre-desc">町の人々と楽しめる交流イベントを計画しましょう！</p>
            </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="トレンドスポット">
            <i class="fa-solid fa-people-group"></i>
              <div class="genre-text-wrap">
            <span>トレンドスポット</span>
             <p class="genre-desc">若い世代にしかない発想で様々な催しを計画しましょう！</p>
            </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="わくわくワークショップ">
            <i class="fa-solid fa-place-of-worship"></i>
            <div class="genre-text-wrap">
            <span>わくわくワークショップ</span>
             <p class="genre-desc">社会奉仕のワークショップ等のアイデアを出しましょう！</p>
            </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="ハッピーリビング">
            <i class="fa-solid fa-people-roof"></i>
            <div class="genre-text-wrap">
            <span>ハッピーリビング</span>
              <p class="genre-desc">暮らしが楽しくなる家庭関連のアイデアを出しましょう！</p>
            </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="政治経済">
            <i class="fa-solid fa-landmark-dome"></i>
             <div class="genre-text-wrap">
            <span>政治経済</span>
              <p class="genre-desc">経済リテラシーや良い政治の案などを出しましょう！</p>
            </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="くらしのバリア">
            <i class="fa-solid fa-helmet-safety"></i>
            <div class="genre-text-wrap">
            <span>くらしのバリア</span>
              <p class="genre-desc">我々の住む町を住みやすくするにはどうしたらよいのか考えてみませんか？</p>
  </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="LOVESPACE">
            <i class="fa-solid fa-face-grin-hearts"></i>
             <div class="genre-text-wrap">
            <span>LOVESPACE</span>
              <p class="genre-desc">町の人同士で今よりも愛で満ちた暮らしにしませんか？</p>

          </button>
        </li>
        <li>

              <div class="genre-text-wrap">

            </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="CREATION">
            <i class="fa-regular fa-lightbulb"></i>
             <div class="genre-text-wrap">
            <span>CREATION</span>
              <p class="genre-desc">町の人々とともに創造的なアイディアを出し合いましょう！</p>
            </div>
          </button>
        </li>
        <li>
          <button class="genreButton" data-genre="リラックススペース">

        <li>

            </div>
          </button>
        </li>
      </ul>
    </main>

    <!-- チャット画面 -->
    <section id="chatPage" class="hidden">
      <div class="container">
        <button id="backButton" type="button">← ジャンル一覧に戻る</button>
        <h3 id="chatTitle">チャットルーム</h3>

        <div class="messages-wrapper">
          <button id="panelToggle" class="panel-toggle-button" type="button" title="入力欄を拡大">＋</button>
          <div id="messages" class="post-history">メッセージを読み込み中...</div>
        </div>

        <form id="chatForm" class="chat-form">
          <div class="form-group">
            <label for="message">メッセージ</label>
            <div class="chat-compose-row">
              <textarea id="message" class="chat-textarea" placeholder="メッセージを入力..." required></textarea>
              <button type="button" id="attachButton" class="attach-button" title="ファイルを添付">
                <i class="fa-solid fa-paperclip"></i>
              </button>
              <button type="submit" class="submit-button">送信</button>
            </div>
          </div>
          <input type="file" id="fileInput" class="file-input" />
        </form>
      </div>
    </section>

    <script>
      var currentGenre = "";

      // ジャンルボタン → チャット画面へ切り替え
      document.querySelectorAll(".genreButton").forEach(function (button) {
        button.addEventListener("click", function () {
          currentGenre = this.dataset.genre;
          document.getElementById("chatTitle").textContent = currentGenre + " のチャット";
          document.getElementById("genreListPage").classList.add("hidden");
          document.getElementById("controlebar").classList.add("hidden");
          document.getElementById("chatPage").classList.remove("hidden");
          loadMessages();
        });
      });

      // ジャンル一覧に戻る
      document.getElementById("backButton").addEventListener("click", function () {
        document.getElementById("chatPage").classList.add("hidden");
        document.getElementById("genreListPage").classList.remove("hidden");
        document.getElementById("controlebar").classList.remove("hidden");
      });

      // メッセージをサーバーから取得
      async function loadMessages() {
        try {
          var response = await fetch(
            "php/chat_get.php?genre=" + encodeURIComponent(currentGenre)
          );
          var data = await response.json();
          var container = document.getElementById("messages");

          if (!data.messages || data.messages.length === 0) {
            container.innerHTML = '<p>まだメッセージはありません</p>';
            return;
          }

          container.innerHTML = data.messages
            .map(function (msg) {
              return (
                '<li><strong>' + msg.user_name + '</strong>' +
                '<span>' + msg.message + '</span>' +
                '<small>' + msg.created_at + '</small></li>'
              );
            })
            .join("");
        } catch (error) {
          document.getElementById("messages").textContent = "メッセージの取得に失敗しました";
          console.error(error);
        }
      }

      // メッセージ送信
      document.getElementById("chatForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        var message = document.getElementById("message").value.trim();
        if (!message) return;

        try {
          await fetch("php/chat_post.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({ message: message, genre: currentGenre }),
          });
          document.getElementById("message").value = "";
          await loadMessages();
        } catch (error) {
          console.error(error);
        }
      });

      // ファイル添付（UIのみ）
      document.getElementById("attachButton").addEventListener("click", function () {
        document.getElementById("fileInput").click();
      });

      document.getElementById("fileInput").addEventListener("change", function (event) {
        if (event.target.files.length > 0) {
          alert("添付ファイル: " + event.target.files[0].name);
        }
      });

      // 入力欄の拡大トグル
      document.getElementById("panelToggle").addEventListener("click", function (e) {
        e.preventDefault();
        var chatPage = document.getElementById("chatPage");
        var expanded = chatPage.classList.toggle("expanded-input");
        this.textContent = expanded ? "−" : "＋";
      });

      // チャット表示中は5秒ごとに更新
      setInterval(function () {
        if (!document.getElementById("chatPage").classList.contains("hidden")) {
          loadMessages();
        }
      }, 5000);
    </script>
  </body>
</html>
