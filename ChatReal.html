<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTrend - チャット</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="panel">
        <nav><a href="php/QuickTrend.php">戻る</a><a href="php/logout.php">ログアウト</a></nav>
        <h1>チャットルーム</h1>
        <div id="messages">メッセージを読み込み中...</div>
        <form id="chatForm" class="chat-form">
            <input type="text" id="message" placeholder="メッセージを入力" autocomplete="off" required>
            <button type="submit">送信</button>
        </form>
    </div>
    <script>
        async function loadMessages() {
            const response = await fetch('php/chat_get.php');
            const data = await response.json();
            const container = document.getElementById('messages');
            container.innerHTML = data.messages.map(msg =>
                `<div class="message"><strong>${msg.user_name}</strong><span>${msg.message}</span><small>${msg.created_at}</small></div>`
            ).join('');
        }
        document.getElementById('chatForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const message = document.getElementById('message').value.trim();
            if (!message) return;
            await fetch('php/chat_post.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ message })
            });
            document.getElementById('message').value = '';
            await loadMessages();
        });
        loadMessages();
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>
