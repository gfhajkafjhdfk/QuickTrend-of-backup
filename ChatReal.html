    <!-- チャット画面 -->
    <div id="chatPage" style="display: none">
      <div class="container">
        <button id="backButton">前のページに戻る</button>

        <h3 id="chatTitle">チャットルーム</h3>

        <!-- メッセージ表示 -->
        <div style="position: relative">
          <button
            id="panelToggle"
            class="panel-toggle-button"
            type="button"
            title="ログを展開/縮小"
          >
            ＋
          </button>

          <div id="messages" class="post-history">
            メッセージを読み込み中...
          </div>
        </div>
        <!-- チャットフォーム -->
        <form id="chatForm" class="chat-form">
          <div class="form-group">
            <label for="message">メッセージ</label>
            <textarea
              id="message"
              class="chat-textarea"
              placeholder="メッセージを入力..."
              required
            ></textarea>
          </div>
          <button type="button" id="attachButton" class="attach-button">
            <i class="fa-solid fa-paperclip"></i>
          </button>

          <input type="file" id="fileInput" class="file-input" />

          <button type="submit" class="submit-button">送信</button>
        </form>
      </div>
    </div>

    <script>
      let currentGenre = "";

      // ジャンル選択
      document.querySelectorAll(".genreButton").forEach((button) => {
        button.addEventListener("click", function () {
          currentGenre = this.dataset.genre;

          document.getElementById("chatTitle").textContent =
            currentGenre + " のチャット";

          document.getElementById("genreListPage").style.display = "none";
          document.getElementById("controlebar").style.display = "none";

          document.getElementById("chatPage").style.display = "block";

          loadMessages();
        });
      });

      // 戻るボタン
      document
        .getElementById("backButton")
        .addEventListener("click", function () {
          document.getElementById("chatPage").style.display = "none";

          document.getElementById("genreListPage").style.display = "flex";

          document.getElementById("controlebar").style.display = "block";
        });

      // メッセージ読み込み
      async function loadMessages() {
        try {
          const response = await fetch(
            "php/chat_get.php?genre=" + encodeURIComponent(currentGenre),
          );

          const data = await response.json();

          const container = document.getElementById("messages");

          if (!data.messages || data.messages.length === 0) {
            container.innerHTML =
              '<p style="text-align:center;">まだメッセージはありません</p>';

            return;
          }

          container.innerHTML = data.messages
            .map(
              (msg) => `

                    <div id="postList">
                        <li>
                            <strong>${msg.user_name}</strong>
                            <span>${msg.message}</span><br>
                            <small>${msg.created_at}</small>
                        </li>
                    </div>

                `,
            )
            .join("");
        } catch (error) {
          document.getElementById("messages").innerHTML =
            "メッセージの取得に失敗しました";

          console.error(error);
        }
      }

      // 投稿処理
      document
        .getElementById("chatForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const message = document.getElementById("message").value.trim();

          if (!message) return;

          try {
            await fetch("php/chat_post.php", {
              method: "POST",

              headers: {
                "Content-Type": "application/x-www-form-urlencoded",
              },

              body: new URLSearchParams({
                message: message,
                genre: currentGenre,
              }),
            });

            document.getElementById("message").value = "";

            await loadMessages();
          } catch (error) {
            console.error(error);
          }
        });

      // 送信に向けた添付ボタン
      document
        .getElementById("attachButton")
        .addEventListener("click", function () {
          document.getElementById("fileInput").click();
        });

      document
        .getElementById("fileInput")
        .addEventListener("change", function (event) {
          if (event.target.files.length > 0) {
            const fileName = event.target.files[0].name;
            alert("添付ファイル: " + fileName);
          }
        });

      // 入力拡大 / ログ縮小トグル
      document
        .getElementById("panelToggle")
        .addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          const chatPage = document.getElementById("chatPage");
          const expanded = chatPage.classList.toggle("expanded-input");
          this.textContent = expanded ? "−" : "＋";
        });

      // 5秒ごと更新
      setInterval(() => {
        if (document.getElementById("chatPage").style.display === "block") {
          loadMessages();
        }
      }, 5000);
    </script>
