<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTrend - ログイン</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; padding: 2rem; }
        .box { max-width: 420px; margin: 0 auto; background: white; padding: 1.8rem; border-radius: 12px; box-shadow: 0 16px 45px rgba(0,0,0,.08); }
        label { display: block; margin-top: 1rem; }
        input { width: 100%; padding: .8rem; margin-top: .4rem; border: 1px solid #c5cbd3; border-radius: 6px; }
        button { width: 100%; margin-top: 1.4rem; padding: .9rem; border: none; border-radius: 8px; background: #2f71b2; color: white; font-size: 1rem; }
        a { display: inline-block; margin-top: 1rem; color: #2f71b2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ログイン</h1>
        <form method="post" action="php/login.php">
            <label>メールアドレス<input type="email" name="email" required></label>
            <label>パスワード<input type="password" name="password" required></label>
            <button type="submit">サインイン</button>
        </form>
        <a href="sighup.html">アカウントをお持ちでない方はこちら</a>
    </div>
</body>
</html>
